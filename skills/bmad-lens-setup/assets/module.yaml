  result: "{project-root}/{value}"

lens_gates_folder:
  prompt: "Where should LENS store gates and readiness checks?"
  default: "{project-root}/_bmad-output/lens/gates"
  result: "{project-root}/{value}"

lens_bridge_folder:
  prompt: "Where should LENS store BMAD bridge packets and sync reports?"
  default: "{project-root}/_bmad-output/lens/bmad-bridge"
  result: "{project-root}/{value}"

lens_implementation_folder:
