    - teacher opens workspace
  ends_with:
    - teacher knows whether evidence is present and current
  steps:
    - id: journey_step.evidence_to_teacher_action.001
      kind: journey_step
      name: Evidence Captured
      actor: student_or_system
      surface: evidence source
      evidence_or_data:
        - artifact.student_evidence
      decision: null
      state_change: evidence artifact exists
      success_evidence:
        - source metadata recorded
    - id: journey_step.evidence_to_teacher_action.002
      kind: journey_step
      name: Teacher Views Evidence
      actor: role.teacher
      surface: teacher evidence inbox
      evidence_or_data:
        - artifact.teacher_visible_evidence
      decision: decision.teacher_access_policy
      state_change: teacher has seen source evidence
      success_evidence:
        - permitted teacher can open artifact
        - source and timestamp are visible
  risks:
